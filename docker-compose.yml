version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gradcareer-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data:ro
      - gradcareer_db:/app/data/db
    environment:
      - GC_DATABASE_URL=sqlite+aiosqlite:///./data/db/gradcareer.db
      - GC_DATA_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gradcareer-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  gradcareer_db:
    driver: local

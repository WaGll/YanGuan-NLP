version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yanguan-backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data:ro
      - yanguan_db:/app/data/db
    environment:
      - GC_DATABASE_URL=sqlite+aiosqlite:///./data/db/yanguan.db
      - GC_DATA_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yanguan-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  yanguan_db:
    driver: local
